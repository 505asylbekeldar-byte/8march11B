<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>8 Наурыз</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7eb3,#ffd6ec);
font-family:Arial;
overflow:hidden;
}

.envelope{
width:260px;
height:180px;
background:#ff4f9a;
cursor:pointer;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card{
position:absolute;
background:white;
padding:35px;
border-radius:20px;
max-width:700px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:none;
animation:show 1.2s;
}

h1{
color:#ff2f86;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff2f86;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

/* ГАЛЕРЕЯ */

.gallery{
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,120px);
grid-template-rows:repeat(3,120px);
gap:12px;
justify-content:center;
}

.gallery img{
width:120px;
height:120px;
object-fit:cover;
border-radius:15px;
padding:6px;
background:white;
border:3px solid #ff7eb3;

box-shadow:
0 10px 25px rgba(0,0,0,0.3),
0 0 15px rgba(255,126,179,0.6);

transition:0.3s;
}

.gallery img:hover{
transform:scale(1.15) rotate(3deg);
box-shadow:
0 15px 35px rgba(0,0,0,0.4),
0 0 25px rgba(255,47,134,0.9);
}

/* расположение фото */

.photo1{grid-column:1; grid-row:1;}
.photo2{grid-column:3; grid-row:1;}
.photo3{grid-column:2; grid-row:2;}
.photo4{grid-column:1; grid-row:3;}
.photo5{grid-column:3; grid-row:3;}

.flower{
position:absolute;
top:-20px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

@keyframes show{
from{opacity:0; transform:scale(0.5);}
to{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
💌 Аш
</div>

<div class="card" id="card">

<h1>🌸 8 Наурыз құтты болсын! 🌸</h1>

<p>
Құрметті <b>11 "Б" сынып қыздары</b>,  
сіздерді көктемнің ең әдемі мерекесімен  
шын жүректен құттықтаймыз! 💐
</p>

<p>
Сіздерге бақыт, денсаулық,  
көп қуаныш және жарқын болашақ тілейміз ✨
</p>

<p><b>Ізгі тілекпен — 11 "Б" сынып ұлдары</b></p>

<div class="gallery">

<img src="https://github.com/505asylbekeldar-byte/6/blob/main/WhatsApp%20Image%202026-03-07%20at%2019.33.19.jpeg?raw=true" class="photo1">

<img src="https://github.com/505asylbekeldar-byte/5/blob/main/WhatsApp%20Image%202026-03-07%20at%2018.37.52%20(1).jpeg?raw=true" class="photo2">

<img src="https://github.com/505asylbekeldar-byte/1/blob/main/WhatsApp%20Image%202026-03-07%20at%2018.37.52.jpeg?raw=true" class="photo3">

<img src="https://github.com/505asylbekeldar-byte/4/blob/main/WhatsApp%20Image%202026-03-07%20at%2019.33.08.jpeg?raw=true" class="photo4">

<img src="https://github.com/505asylbekeldar-byte/7/blob/main/WhatsApp%20Image%202026-03-07%20at%2019.33.19%20(1).jpeg?raw=true" class="photo5">

</div>

<button onclick="alert('🌸 8 Наурыз құтты болсын! 💐')">
Бассай ❤️
</button>

<button onclick="showAddress()">
📍 Адрес?
</button>

</div>

<script>

function openLetter(){
document.querySelector(".envelope").style.display="none";
document.getElementById("card").style.display="block";
}

function showAddress(){
alert("📍 Мекенжай: Шымкент қаласы, № ... мектеп, 11 'Б' сынып");
}

function createFlower(){
const el=document.createElement("div");
el.className="flower";
el.innerHTML=Math.random()>0.5?"🌸":"💖";
el.style.left=Math.random()*100+"vw";
el.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(el);

setTimeout(()=>{el.remove();},8000);
}

setInterval(createFlower,300);

</script>

</body>
</html>
